version: '3.9'

services:
  savannaguard:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - PORT=3000
      - DB_PATH=/data/savannaguard.db
    volumes:
      - savannaguard_data:/data
    restart: unless-stopped

volumes:
  savannaguard_data: