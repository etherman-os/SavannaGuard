services:
  savannaguard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required. Set it in your .env file.}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required. Set it in your .env file.}
      - ADMIN_SESSION_TTL_MS=${ADMIN_SESSION_TTL_MS:-43200000}
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DB_PATH=/data/savannaguard.db
      - BODY_LIMIT_BYTES=${BODY_LIMIT_BYTES:-131072}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - SECURITY_HEADERS_ENABLED=${SECURITY_HEADERS_ENABLED:-true}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - TOKEN_SINGLE_USE=${TOKEN_SINGLE_USE:-true}
      - FEDERATION_ENABLED=${FEDERATION_ENABLED:-false}
      - FEDERATION_PEERS=${FEDERATION_PEERS:-}
      - FEDERATION_PSK=${FEDERATION_PSK:-}
      - FEDERATION_SYNC_INTERVAL=${FEDERATION_SYNC_INTERVAL:-300000}
      - FEDERATION_OFFLINE_SYNC_INTERVAL=${FEDERATION_OFFLINE_SYNC_INTERVAL:-1800000}
      - FEDERATION_OFFLINE_THRESHOLD=${FEDERATION_OFFLINE_THRESHOLD:-3}
      - FEDERATION_MAX_PAYLOAD_BYTES=${FEDERATION_MAX_PAYLOAD_BYTES:-5242880}
      - FEDERATION_REQUEST_TIMEOUT_MS=${FEDERATION_REQUEST_TIMEOUT_MS:-30000}
      - FEDERATION_MAX_RETRIES=${FEDERATION_MAX_RETRIES:-3}
      - FEDERATION_BASE_RETRY_DELAY_MS=${FEDERATION_BASE_RETRY_DELAY_MS:-5000}
      - FEDERATION_MAX_RETRY_DELAY_MS=${FEDERATION_MAX_RETRY_DELAY_MS:-60000}
      - FEDERATION_ALLOW_PRIVATE_PEERS=${FEDERATION_ALLOW_PRIVATE_PEERS:-false}
      - ADAPTIVE_MIN_SAMPLES=${ADAPTIVE_MIN_SAMPLES:-10}
      - PASSIVE_PROTECTION_ENABLED=${PASSIVE_PROTECTION_ENABLED:-true}
      - PASSIVE_PROTECTION_BLOCK_DC=${PASSIVE_PROTECTION_BLOCK_DC:-false}
      - PASSIVE_PROTECTION_DC_RATE_LIMIT=${PASSIVE_PROTECTION_DC_RATE_LIMIT:-3}
      - PASSIVE_PROTECTION_CUSTOM_RANGES=${PASSIVE_PROTECTION_CUSTOM_RANGES:-}
    volumes:
      - savannaguard_data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  savannaguard_data:
